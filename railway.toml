[build]
  dockerfile = "Dockerfile"

[deploy]
  startCommand = "python manage.py migrate --noinput && python manage.py create_admin && gunicorn config.wsgi:application --bind 0.0.0.0:${PORT:-8000} --workers 2 --timeout 120 --access-logfile -"
  healthcheckPath = "/health/"
  healthcheckTimeout = 300
  restartPolicyType = "ON_FAILURE"
  restartPolicyMaxRetries = 3
